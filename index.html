<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Currículum - Lautaro Gabriel</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        .contenedor {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .cv {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 1px;
        }

        .contenido {
            padding: 25px;
        }

        h2 {
            color: #0072ff;
            margin-top: 25px;
            border-left: 5px solid #00c6ff;
            padding-left: 10px;
        }

        p {
            margin: 8px 0;
            color: #333;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .dato {
            background: #f4f7ff;
            padding: 10px;
            border-radius: 10px;
        }

        .dato strong {
            color: #0072ff;
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
